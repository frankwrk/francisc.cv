<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discrete Field — francisc.cv Article Thumbnails</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ap-dark: #141413;
      --ap-light: #faf9f5;
      --ap-mid-gray: #b0aea5;
      --ap-light-gray: #e8e6dc;
      --ap-orange: #d97757;
      --ap-blue: #6a9bcc;
      --ap-green: #788c5d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--ap-light) 0%, #f0ede6 100%);
      min-height: 100vh;
      color: var(--ap-dark);
    }
    .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }

    /* ── Sidebar ── */
    .sidebar {
      width: 296px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(20,20,19,0.10);
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sidebar h1 {
      font-family: 'Lora', serif;
      font-size: 21px;
      font-weight: 500;
      color: var(--ap-dark);
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }
    .sidebar .subtitle {
      color: var(--ap-mid-gray);
      font-size: 11px;
      margin-bottom: 26px;
      line-height: 1.5;
      letter-spacing: 0.01em;
    }
    .section { margin-bottom: 26px; }
    .section h3 {
      font-size: 10px;
      font-weight: 600;
      color: var(--ap-mid-gray);
      text-transform: uppercase;
      letter-spacing: 0.10em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section h3::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--ap-orange);
      border-radius: 50%;
    }

    /* ── Preset Grid ── */
    .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
    .preset-btn {
      padding: 8px 9px 8px 9px;
      border-radius: 6px;
      font-size: 10.5px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--ap-light-gray);
      background: var(--ap-light);
      color: var(--ap-dark);
      transition: all 0.12s ease;
      text-align: left;
      line-height: 1.35;
    }
    .preset-btn:hover { border-color: var(--ap-mid-gray); background: white; }
    .preset-btn.active { border-color: var(--ap-orange); background: white; box-shadow: 0 0 0 2px rgba(217,119,87,0.12); }
    .preset-section-label {
      display: block;
      font-size: 8.5px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--ap-mid-gray);
      margin-bottom: 3px;
    }
    .preset-swatch {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
      position: relative; top: -1px;
    }
    .preset-info {
      padding: 9px 11px;
      background: var(--ap-light);
      border-radius: 6px;
      border-left: 2.5px solid var(--ap-orange);
    }
    .preset-info-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--ap-dark);
      margin-bottom: 2px;
    }
    .preset-info-desc {
      font-size: 10px;
      color: var(--ap-mid-gray);
      line-height: 1.5;
    }

    /* ── Seed ── */
    .seed-display {
      width: 100%;
      background: var(--ap-light);
      padding: 9px 10px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      margin-bottom: 8px;
      border: 1px solid var(--ap-light-gray);
      text-align: center;
    }
    .seed-display:focus { outline: none; border-color: var(--ap-orange); box-shadow: 0 0 0 2px rgba(217,119,87,0.10); background: white; }
    .seed-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 5px; }

    /* ── Parameters ── */
    .control-group { margin-bottom: 14px; }
    .control-group label { display: block; font-size: 11px; font-weight: 500; color: var(--ap-dark); margin-bottom: 5px; }
    .slider-row { display: flex; align-items: center; gap: 8px; }
    .slider-row input[type="range"] {
      flex: 1; height: 3px;
      background: var(--ap-light-gray);
      border-radius: 2px; outline: none;
      -webkit-appearance: none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      background: var(--ap-orange);
      border-radius: 50%; cursor: pointer;
      transition: transform 0.15s;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .slider-row input[type="range"]::-moz-range-thumb {
      width: 13px; height: 13px;
      background: var(--ap-orange);
      border-radius: 50%; border: none; cursor: pointer;
    }
    .val { font-family: 'Courier New', monospace; font-size: 10px; color: var(--ap-mid-gray); min-width: 36px; text-align: right; }

    /* ── Buttons ── */
    .btn {
      background: var(--ap-orange); color: white;
      border: none; padding: 8px 12px;
      border-radius: 6px; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all 0.15s ease;
      width: 100%; margin-bottom: 5px; letter-spacing: 0.01em;
    }
    .btn:hover { background: #c86641; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn.blue { background: var(--ap-blue); }
    .btn.blue:hover { background: #5a8bb8; }
    .btn.green { background: var(--ap-green); }
    .btn.green:hover { background: #6b7b52; }
    .btn-row { display: flex; gap: 5px; }
    .btn-row .btn { flex: 1; }

    /* ── Canvas ── */
    .canvas-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-width: 0; gap: 10px;
    }
    #canvas-wrap {
      width: 100%; max-width: 1100px;
      border-radius: 6px; overflow: hidden;
      box-shadow: 0 16px 48px rgba(20,20,19,0.18);
    }
    #canvas-wrap canvas { display: block; width: 100% !important; height: auto !important; }
    .canvas-meta {
      font-family: 'Courier New', monospace;
      font-size: 10px; color: var(--ap-mid-gray);
      letter-spacing: 0.04em; text-align: center;
    }
    .loading {
      height: 220px; display: flex;
      align-items: center; justify-content: center;
      font-size: 13px; color: var(--ap-mid-gray);
    }
    @media (max-width: 720px) {
      .container { flex-direction: column; }
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ── Sidebar ── -->
  <div class="sidebar">
    <h1>Discrete Field</h1>
    <div class="subtitle">Industrial pixel-grid thumbnails<br>for francisc.cv articles</div>

    <!-- Article presets -->
    <div class="section">
      <h3>Article</h3>
      <div class="preset-grid" id="preset-grid"></div>
      <div class="preset-info">
        <div class="preset-info-name" id="info-name">—</div>
        <div class="preset-info-desc" id="info-desc">—</div>
      </div>
    </div>

    <!-- Seed -->
    <div class="section">
      <h3>Seed</h3>
      <input type="number" id="seed-input" class="seed-display" value="3721" onchange="updateSeed()">
      <div class="seed-row">
        <button class="btn blue" onclick="previousSeed()">← Prev</button>
        <button class="btn blue" onclick="nextSeed()">Next →</button>
      </div>
      <button class="btn green" onclick="randomSeedAndUpdate()">↻ Random</button>
    </div>

    <!-- Parameters -->
    <div class="section">
      <h3>Parameters</h3>

      <div class="control-group">
        <label>Cell Size</label>
        <div class="slider-row">
          <input type="range" id="cellSize" min="8" max="36" step="1" value="20"
            oninput="updateParam('cellSize', parseInt(this.value))">
          <span class="val" id="cellSize-val">20</span>
        </div>
      </div>

      <div class="control-group">
        <label>Gap Width</label>
        <div class="slider-row">
          <input type="range" id="gap" min="1" max="8" step="1" value="3"
            oninput="updateParam('gap', parseInt(this.value))">
          <span class="val" id="gap-val">3</span>
        </div>
      </div>

      <div class="control-group">
        <label>Shade Levels</label>
        <div class="slider-row">
          <input type="range" id="shadeCount" min="3" max="9" step="1" value="6"
            oninput="updateParam('shadeCount', parseInt(this.value))">
          <span class="val" id="shadeCount-val">6</span>
        </div>
      </div>

      <div class="control-group">
        <label>Noise Scale</label>
        <div class="slider-row">
          <input type="range" id="noiseScale" min="0.3" max="3.5" step="0.1" value="1.0"
            oninput="updateParam('noiseScale', parseFloat(this.value))">
          <span class="val" id="noiseScale-val">1.0×</span>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="section">
      <h3>Actions</h3>
      <button class="btn" onclick="downloadPNG()">↓ Download PNG (1200×630)</button>
      <div class="btn-row">
        <button class="btn blue" onclick="lockSeed()">Lock Seed</button>
        <button class="btn green" onclick="resetToArticle()">Reset</button>
      </div>
    </div>
  </div>

  <!-- ── Canvas ── -->
  <div class="canvas-area">
    <div id="canvas-wrap">
      <div class="loading">Initializing Discrete Field…</div>
    </div>
    <div class="canvas-meta" id="canvas-meta">—</div>
  </div>

</div>
<script>
// ═══════════════════════════════════════════════════════
// ARTICLE CONFIGURATIONS — DISCRETE FIELD
// Each encodes the article's conceptual character into
// its noise parameters and bias function.
// ═══════════════════════════════════════════════════════

const ARTICLES = [
  {
    id:          'geoformations',
    label:       'UX Redesign',
    slug:        'geoformations-redesign',
    section:     'Work',
    hue: 215, sat: 52, bri: 62,
    swatchHex:   '#3a6fa8',
    seed:        3721,
    cellSize:    20,  gap: 3,
    // Horizontally elongated — information radiating outward like a signal wave
    noiseScaleX: 0.0030,
    noiseScaleY: 0.0085,
    oct2: { w: 0.28, f: 3.2, ox: 500, oy: 0 },
    bias:        'none',
    description: 'Horizontal wave propagation — signal radiating outward to audiences'
  },
  {
    id:          'docs-playbook',
    label:       'Docs System',
    slug:        'docs-as-product-playbook',
    section:     'Work',
    hue: 40, sat: 72, bri: 66,
    swatchHex:   '#c49520',
    seed:        1847,
    cellSize:    13,  gap: 2,
    // Fine grain — dense knowledge compressing into structure
    noiseScaleX: 0.0108,
    noiseScaleY: 0.0108,
    oct2: { w: 0.45, f: 4.8, ox: 0, oy: 350 },
    bias:        'none',
    description: 'High-density field — knowledge crystallising into tight structure'
  },
  {
    id:          'platform-migration',
    label:       'Platform Mig.',
    slug:        'platform-onboarding-accelerator',
    section:     'Work',
    hue: 208, sat: 22, bri: 50,
    swatchHex:   '#5c7a8c',
    seed:        5293,
    cellSize:    22,  gap: 3,
    // Drift left-to-right — system state propagating across the field
    noiseScaleX: 0.0038,
    noiseScaleY: 0.004,
    oct2: { w: 0.22, f: 2.2, ox: 200, oy: 200 },
    bias:        'drift-ltr',
    description: 'Diffusion front — a system state migrating left to right'
  },
  {
    id:          'security',
    label:       'Security',
    slug:        'secure-release-gates',
    section:     'Work',
    hue: 82, sat: 42, bri: 38,
    swatchHex:   '#5a6b3a',
    seed:        7156,
    cellSize:    20,  gap: 3,
    // Perimeter boost — active scanning at the boundary, calm interior
    noiseScaleX: 0.0050,
    noiseScaleY: 0.0050,
    oct2: { w: 0.38, f: 3.8, ox: 100, oy: 100 },
    bias:        'perimeter',
    description: 'Perimeter scan — anomaly activity clustering at the defensive edge'
  },
  {
    id:          'systems-thinking',
    label:       'Systems Thinking',
    slug:        'systems-thinking-in-web-projects',
    section:     'Thinking',
    hue: 8, sat: 55, bri: 50,
    swatchHex:   '#8b4a38',
    seed:        2438,
    cellSize:    18,  gap: 2,
    // Double-smootherstep cellular — local rules producing global structure
    noiseScaleX: 0.0050,
    noiseScaleY: 0.0050,
    oct2: { w: 0.50, f: 5.5, ox: 400, oy: 0 },
    bias:        'cellular',
    description: 'Emergent cell clusters — local noise rules → global ordered zones'
  },
  {
    id:          'docs-surface',
    label:       'Docs Surface',
    slug:        'documentation-as-product-surface',
    section:     'Thinking',
    hue: 220, sat: 10, bri: 35,
    swatchHex:   '#3f4555',
    seed:        9012,
    cellSize:    20,  gap: 3,
    // Power-curve compression — most cells dark, rare bright anomalies
    noiseScaleX: 0.0060,
    noiseScaleY: 0.0060,
    oct2: { w: 0.20, f: 2.5, ox: 0, oy: 500 },
    bias:        'compressed',
    description: 'Compressed density — maximum information, rare signal spikes'
  },
  {
    id:          'bridging',
    label:       'Bridging UX/Eng',
    slug:        'bridging-ux-and-engineering',
    section:     'Thinking',
    hue: 33, sat: 32, bri: 58,
    swatchHex:   '#9a8060',
    seed:        4567,
    cellSize:    20,  gap: 3,
    // Two noise orientations interfering — two systems finding alignment
    noiseScaleX: 0.0042,
    noiseScaleY: 0.0042,
    oct2: { w: 0.44, f: 3.0, ox: 0, oy: 0 },
    bias:        'interference',
    description: 'Dual-layer interference — two noise fields in cross-harmonic tension'
  }
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════

let currentIdx = 0;

let params = {
  seed:       ARTICLES[0].seed,
  cellSize:   ARTICLES[0].cellSize,
  gap:        ARTICLES[0].gap,
  shadeCount: 6,
  noiseScale: 1.0,
};

// ═══════════════════════════════════════════════════════
// P5.JS — SETUP + RENDER
// ═══════════════════════════════════════════════════════

function setup() {
  let c = createCanvas(1200, 630);
  c.parent('canvas-wrap');
  noLoop();
  colorMode(HSB, 360, 100, 100, 100);

  document.querySelector('.loading')?.remove();
  buildPresetGrid();
  updateInfoPanel();
  initializeSystem();
}

function draw() { /* static — driven by initializeSystem() */ }

function initializeSystem() {
  randomSeed(params.seed);
  noiseSeed(params.seed);
  render();
  updateInfoPanel();
}

function render() {
  let cfg  = ARTICLES[currentIdx];
  let cs   = params.cellSize;
  let gap  = params.gap;
  let ns   = params.noiseScale;
  let tc   = params.shadeCount;

  colorMode(HSB, 360, 100, 100, 100);

  // Dark field background (very dark version of article hue)
  background(cfg.hue, cfg.sat * 0.55, cfg.bri * 0.12);

  let shades = makeShades(cfg.hue, cfg.sat, tc);

  let step = cs + gap;
  let cols = floor(width  / step);
  let rows = floor(height / step);
  let ox   = (width  - cols * step) / 2;
  let oy   = (height - rows * step) / 2;

  noStroke();

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      let val = sampleField(c, r, cols, rows, cfg, ns);
      let si  = constrain(floor(val * tc), 0, tc - 1);
      fill(shades[si]);
      rect(ox + c * step, oy + r * step, cs, cs);
    }
  }
}

// ── Noise field sampler ──────────────────────────────

function sampleField(c, r, cols, rows, cfg, nsm) {
  let nx  = c * cfg.noiseScaleX * nsm;
  let ny  = r * cfg.noiseScaleY * nsm;
  let o   = cfg.oct2;
  let val;

  if (cfg.bias === 'interference') {
    // Two noise orientations at ~72° to each other, plus a third octave
    // Octave offsets scaled by 0.01 to match server-side discrete-field.ts
    let n1 = noise(nx, ny);
    let n2 = noise(ny * 0.72 + 1000, nx * 0.72 + 2000);
    let n3 = noise(nx * o.f + o.ox * 0.01, ny * o.f + o.oy * 0.01);
    val = n1 * 0.44 + n2 * 0.36 + n3 * 0.20;
  } else {
    // Standard: primary layer + single octave (offsets scaled by 0.01 to match server)
    let n1 = noise(nx, ny);
    let n2 = noise(nx * o.f + o.ox * 0.01, ny * o.f + o.oy * 0.01);
    val = n1 * (1 - o.w) + n2 * o.w;
  }

  // ── Bias modifiers ───────────────────────────────

  switch (cfg.bias) {

    case 'drift-ltr': {
      // Smooth directional gradient: left darker, right brighter
      // Guard cols === 1 to avoid division by zero (match server-side discrete-field.ts)
      let t = cols > 1 ? c / (cols - 1) : 0;
      val = val * 0.58 + t * 0.42;
      break;
    }

    case 'perimeter': {
      // Cells within ~20% of any edge get a brightness boost
      let ex = min(c, cols - 1 - c) / (cols * 0.20);
      let ey = min(r, rows - 1 - r) / (rows * 0.20);
      let d  = constrain(min(ex, ey), 0, 1);
      val = constrain(val * 0.52 + (1 - d) * 0.55, 0, 1);
      break;
    }

    case 'cellular': {
      // Double-smootherstep: pushes values strongly toward 0 or 1,
      // creating distinct zone clusters — emergent cell behaviour
      val = smootherstep(val);
      val = smootherstep(val);
      break;
    }

    case 'compressed': {
      // Power curve: most cells are very dark; rare spikes break through
      val = pow(val, 2.6);
      break;
    }
  }

  return constrain(val, 0, 1);
}

function smootherstep(t) {
  return t * t * t * (t * (t * 6 - 15) + 10);
}

// ── Shade palette ────────────────────────────────────

function makeShades(h, s, count) {
  colorMode(HSB, 360, 100, 100, 100);
  let shades = [];
  for (let i = 0; i < count; i++) {
    let t   = i / (count - 1);              // 0 → darkest … 1 → lightest
    let bri = lerp(14, 91, t);              // fixed luminance range: 14–91%
    let sat = s * lerp(1.05, 0.14, t);      // saturation fades toward white end
    sat = constrain(sat, 3, 100);
    shades.push(color(h, sat, bri));
  }
  return shades;
}

// ═══════════════════════════════════════════════════════
// UI — PRESET GRID
// ═══════════════════════════════════════════════════════

function buildPresetGrid() {
  let grid = document.getElementById('preset-grid');
  grid.innerHTML = '';
  ARTICLES.forEach((art, idx) => {
    let btn = document.createElement('button');
    btn.className = 'preset-btn' + (idx === currentIdx ? ' active' : '');
    btn.onclick   = () => selectArticle(idx);
    btn.innerHTML =
      `<span class="preset-section-label">${art.section}</span>` +
      `<span class="preset-swatch" style="background:${art.swatchHex}"></span>` +
      art.label;
    grid.appendChild(btn);
  });
}

function selectArticle(idx) {
  currentIdx = idx;
  let art = ARTICLES[idx];
  // Reset params to article defaults
  params.seed       = art.seed;
  params.cellSize   = art.cellSize;
  params.gap        = art.gap;
  params.shadeCount = 6;
  params.noiseScale = 1.0;
  syncSliders();
  updateSeedDisplay();
  buildPresetGrid();
  initializeSystem();
}

function updateInfoPanel() {
  let art = ARTICLES[currentIdx];
  document.getElementById('info-name').textContent  = art.label + ' — ' + art.section;
  document.getElementById('info-desc').textContent  = art.description;
  document.getElementById('canvas-meta').textContent =
    art.slug + '  ·  seed ' + params.seed + '  ·  ' +
    art.hue + '° hue  ·  1200 × 630';
}

// ═══════════════════════════════════════════════════════
// UI — PARAMS + SLIDERS
// ═══════════════════════════════════════════════════════

function updateParam(name, value) {
  params[name] = value;
  let displayEl = document.getElementById(name + '-val');
  if (name === 'noiseScale') {
    displayEl.textContent = value.toFixed(1) + '×';
  } else {
    displayEl.textContent = value;
  }
  initializeSystem();
}

function syncSliders() {
  document.getElementById('cellSize').value        = params.cellSize;
  document.getElementById('cellSize-val').textContent = params.cellSize;
  document.getElementById('gap').value             = params.gap;
  document.getElementById('gap-val').textContent   = params.gap;
  document.getElementById('shadeCount').value      = params.shadeCount;
  document.getElementById('shadeCount-val').textContent = params.shadeCount;
  document.getElementById('noiseScale').value      = params.noiseScale;
  document.getElementById('noiseScale-val').textContent = params.noiseScale.toFixed(1) + '×';
}

// ═══════════════════════════════════════════════════════
// UI — SEED CONTROLS
// ═══════════════════════════════════════════════════════

function updateSeedDisplay() {
  document.getElementById('seed-input').value = params.seed;
}

function updateSeed() {
  let v = parseInt(document.getElementById('seed-input').value);
  if (v > 0) { params.seed = v; initializeSystem(); }
  else { updateSeedDisplay(); }
}

function previousSeed() { params.seed = Math.max(1, params.seed - 1); updateSeedDisplay(); initializeSystem(); }
function nextSeed()     { params.seed = params.seed + 1;              updateSeedDisplay(); initializeSystem(); }
function randomSeedAndUpdate() {
  params.seed = Math.floor(Math.random() * 99999) + 1;
  updateSeedDisplay(); initializeSystem();
}

// ═══════════════════════════════════════════════════════
// UI — ACTIONS
// ═══════════════════════════════════════════════════════

function downloadPNG() {
  let art = ARTICLES[currentIdx];
  saveCanvas(art.slug + '_s' + params.seed, 'png');
}

function lockSeed() {
  // Writes the current seed back into the article's default,
  // so Reset will return to it.
  ARTICLES[currentIdx].seed = params.seed;
  let btn = event.currentTarget;
  let orig = btn.textContent;
  btn.textContent = '✓ Locked';
  setTimeout(() => { btn.textContent = orig; }, 1400);
}

function resetToArticle() {
  let art = ARTICLES[currentIdx];
  params.seed       = art.seed;
  params.cellSize   = art.cellSize;
  params.gap        = art.gap;
  params.shadeCount = 6;
  params.noiseScale = 1.0;
  syncSliders();
  updateSeedDisplay();
  initializeSystem();
}

// ── Init
window.addEventListener('load', () => { syncSliders(); updateSeedDisplay(); });
</script>
</body>
</html>
