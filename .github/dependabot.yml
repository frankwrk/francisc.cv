# Dependency updates for francisc.cv (personal portfolio; package manager: bun).
# Monthly PRs for minor/patch; security advisories open PRs as needed.

version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
